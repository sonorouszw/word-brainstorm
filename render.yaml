# Render Blueprint — 一键部署配置
# 详见: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: word-brainstorm
    env: node
    region: singapore  # 亚洲区域，国内访问更快
    buildCommand: |
      cd frontend && npm install && npm run build
      cd ../server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ACCESS_PASSWORD
        value: storm123
      - key: RATE_LIMIT_MAX
        value: "20"
      # 部署后请改为你的真实 API Key（在 Render Dashboard → Environment 中修改）
      - key: DEEPSEEK_API_KEY
        value: 待填写
